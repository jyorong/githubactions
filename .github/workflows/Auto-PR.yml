name: Auto PR to Main Branch

on:
  push:
    branches:
      - main-dev

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run code review
        run: npm run lint

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.MY_PAT }}
          base: main
          branch: main-dev
          title: "Auto PR: main-dev → main"
          body: |
            This pull request was automatically created after the workflow completed successfully.