name: Auto Create PR and Merge on Success

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create Pull Request to main
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' || echo "")
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "Auto PR: ${{ github.ref_name }}" \
              --body "Automatically created PR from branch ${{ github.ref_name }}"
            echo "Created new PR"
          else
            echo "PR already exists: $PR_EXISTS"
          fi